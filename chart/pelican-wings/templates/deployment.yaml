apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pelican-wings.fullname" . }}
  namespace: {{ .Values.gameNamespace }}
  labels:
    {{- include "pelican-wings.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pelican-wings.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "pelican-wings.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pelican-wings.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: copy-config
          image: busybox:1.36
          command: ["cp", "/config-source/config.yml", "/etc/pelican/config.yml"]
          volumeMounts:
            - name: config-source
              mountPath: /config-source
              readOnly: true
            - name: config
              mountPath: /etc/pelican
      containers:
        - name: wings
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: api
              containerPort: {{ .Values.wings.api.port }}
              protocol: TCP
            - name: sftp
              containerPort: {{ .Values.wings.sftp.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/system
              port: api
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/system
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/pelican
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.wings.system.rootDirectory }}
            {{- end }}
            - name: logs
              mountPath: {{ .Values.wings.system.logDirectory }}
            - name: tmp
              mountPath: {{ .Values.wings.system.tmpDirectory }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config-source
          configMap:
            name: {{ include "pelican-wings.fullname" . }}-config
        - name: config
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "pelican-wings.fullname" .)) }}
        {{- end }}
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
